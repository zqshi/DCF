name: dcf-app-ci

on:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/dcf-app-ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/dcf-app-ci.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run verify:prod-gates
