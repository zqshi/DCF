services:
  openclaw-gateway:
    build:
      context: ../../../runtime/openclaw
      dockerfile: Dockerfile
    image: dcf/openclaw:local
    container_name: dcf-openclaw-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "loopback",
        "--port",
        "18789",
        "--allow-unconfigured"
      ]
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - ./openclaw-config:/home/node/.openclaw
      - ./openclaw-workspace:/home/node/.openclaw/workspace
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false
    pids_limit: 512
    tmpfs:
      - /tmp
    restart: unless-stopped
